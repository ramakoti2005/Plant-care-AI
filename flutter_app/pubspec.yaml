name: web_to_flutter_app
description: Converted Flutter app from web codebase.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.0.5
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  http: ^1.2.0
  flutter_secure_storage: ^9.2.2
  http_parser: ^4.0.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner:
  json_serializable:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true